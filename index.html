<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictionnaire Nzebi-Français</title>
    
    <!-- SEO -->
    <meta name="description" content="Dictionnaire interactif Nzebi-Français : apprenez la langue Nzebi avec des traductions, exemples, prononciations et catégories grammaticales." />
    <meta name="keywords" content="Nzebi, dictionnaire, langue Nzebi, français, traduction, Gabon, langue africaine, apprentissage" />
    <meta name="author" content="Yawel MKK" />

    <!-- Open Graph (réseaux sociaux) -->
    <meta property="og:title" content="Dictionnaire interactif Nzebi-Français" />
    <meta property="og:description" content="Découvrez le dictionnaire interactif Nzebi-Français : traductions, prononciations, exemples et plus encore pour apprendre la langue Nzebi." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='50' dominant-baseline='middle' text-anchor='middle' font-weight='bold' fill='%236366f1'>N</text></svg>" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      .splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        transition: opacity 0.3s ease;
      }
      
      .splash-screen img {
        max-width: 90%;
        max-height: 90vh;
        width: auto;
        height: auto;
        display: block;
        -o-object-fit: contain;
           object-fit: contain;
      }
      
      @media (max-width: 768px) {
        .splash-screen img {
          max-width: 95%;
          max-height: 85vh;
        }
      }
      
      @media (max-width: 480px) {
        .splash-screen img {
          max-width: 100%;
          max-height: 80vh;
          padding: 20px;
        }
      }
      
      .splash-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script>
      // record when the splash was first rendered so the app can ensure a minimum display time
      window.__splashStart = Date.now();
      
      // Fix paths for GitHub Pages - detect if we're on github pages
      const isGithubPages = typeof window !== 'undefined' && /\.github\.io$/i.test(window.location.hostname);
      if (isGithubPages) {
        // We're on GitHub Pages, will need to fix asset paths
        window.__baseUrl = '/dictionnaire-nzebi-fran-ais/';
      } else {
        window.__baseUrl = '/';
      }
    </script>

    <link rel="icon" href="./favicon.ico">
    <script type="module" src="/src/main.tsx"></script>
  </head>

  <body class="font-sans">
    <div id="splash" class="splash-screen">
      <img src="/splash-nzebi.png" id="splash-img" alt="Dictionnaire Nzebi-Français - Splash Screen" />
    </div>
    <div id="root"></div>

    <script>
      // Fix splash image path for GitHub Pages sub-path deployments
      (function() {
        const img = document.getElementById('splash-img');
        if (img) {
          const base = (window.__baseUrl || '/').replace(/\/+$/, '/');
          img.src = base + 'splash-nzebi.png';
          img.onerror = function () {
            // last-resort fallback to a relative path
            img.onerror = null;
            img.src = 'splash-nzebi.png';
          };
        }
      })();
    </script>
  </body>
</html>
